name: lics

services:
  postgres:
    image: postgres:17-alpine
    container_name: lics-postgres
    restart: unless-stopped
    env_file:
      - .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_PORT}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - backend

  backend:
    build:
      context: ../../backend
      dockerfile: Dockerfile
    container_name: lics-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    working_dir: /app
    env_file:
      - .env
    volumes:
      - ../../backend:/app
    ports:
      - "8000:8000"
    command: >
      sh -c "
        python src/manage.py migrate &&
        python src/manage.py runserver 0.0.0.0:8000
      "
    networks:
      - backend

  frontend:
    build:
      context: ../../frontend
      dockerfile: ../infra/docker/Dockerfile.frontend

    container_name: lics-frontend

    restart: unless-stopped

    working_dir: /app

    volumes:
      - ../../frontend:/app
      - frontend_node_modules:/app/node_modules

    ports:
      - "3000:3000"

    command: npm run dev -- --hostname 0.0.0.0

    networks:
      - backend

  nginx:
    image: nginx:1.28-alpine
    container_name: lics-nginx
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_started
      frontend:
        condition: service_started
    volumes:
      - ../../infra/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
    networks:
      - backend

volumes:
  postgres_data:
  frontend_node_modules:

networks:
  backend:
    driver: bridge