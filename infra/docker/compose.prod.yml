name: lics-prod

services:
  postgres:
    image: postgres:17-alpine
    platform: linux/amd64
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - application
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    security_opt:
      - no-new-privileges:true

  backend:
    image: lics-backend:${LICS_VERSION:?LICS_VERSION is required}
    platform: linux/amd64
    build:
      context: ../../backend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      APP_VERSION: ${LICS_VERSION:?LICS_VERSION is required}
      POSTGRES_HOST: postgres
      POSTGRES_PORT: "5432"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - backend_media:/app/src/media
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health/', timeout=5)"
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - application
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    security_opt:
      - no-new-privileges:true

  frontend:
    image: lics-frontend:${LICS_VERSION:?LICS_VERSION is required}
    platform: linux/amd64
    build:
      context: ../../frontend
      dockerfile: Dockerfile.prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_TELEMETRY_DISABLED: "1"
      HOSTNAME: 0.0.0.0
      PORT: "3000"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000').then(r => { if (!r.ok) process.exit(1) }).catch(() => process.exit(1))"
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - application
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    security_opt:
      - no-new-privileges:true

  nginx:
    image: nginx:1.28-alpine
    platform: linux/amd64
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_healthy
    volumes:
      - ../nginx/default.prod.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "127.0.0.1:${HTTP_PORT:-80}:80"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --quiet --tries=1 --output-document=- http://127.0.0.1/nginx-health >/dev/null || exit 1"
        ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - application
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"
    security_opt:
      - no-new-privileges:true

volumes:
  postgres_data:
  backend_media:

networks:
  application:
    driver: bridge
